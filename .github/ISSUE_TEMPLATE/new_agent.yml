name: New agent
description: Request support for another AI coding agent
labels: [agent]
body:
  - type: markdown
    attributes:
      value: |
        An agent is one module in `src/agent/` implementing `Agent` and
        `AgentConfig` — see CONTRIBUTING.md. The questions below are what that
        module needs to answer. Redact any key you paste.

  - type: input
    id: name
    attributes:
      label: Agent name
      description: What it is called, and the command it installs.
      placeholder: opencode (binary `opencode`)
    validations:
      required: true

  - type: input
    id: homepage
    attributes:
      label: Homepage or repository
    validations:
      required: false

  - type: input
    id: config-path
    attributes:
      label: Config path
      description: >
        Default location on each OS you know about, and the environment variable
        that overrides it, if there is one.
      placeholder: ~/.config/example/config.json, overridden by EXAMPLE_CONFIG
    validations:
      required: true

  - type: dropdown
    id: format
    attributes:
      label: Config format
      options:
        - TOML
        - JSON
        - JSON with comments
        - YAML
        - Other
    validations:
      required: true

  - type: textarea
    id: provider-selection
    attributes:
      label: How it selects a provider
      description: >
        Can several named endpoints coexist in the config, or only one at a
        time? Which key or environment variable decides the active one? Does the
        config carry a per-provider model list? Where does the API key live —
        in this file, in a separate credentials file, or only in the
        environment?
    validations:
      required: true

  - type: textarea
    id: sample
    attributes:
      label: Sample config
      description: >
        A configured provider entry, with every key, token and personal path
        replaced by `REDACTED`.
      render: json
    validations:
      required: true

  - type: checkboxes
    id: redacted
    attributes:
      label: Confirmation
      options:
        - label: I have removed every API key, token and personal path from this report.
          required: true
