name: Feature request
description: Suggest a command, a flag or a behaviour
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What are you trying to do
      description: The task, not the solution. What are you doing by hand today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What ConfAI would do
      description: >
        The command or key you would expect, and what it would print or write.
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Where it belongs
      options:
        - CLI
        - Interactive view
        - Both
        - Not sure
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: >
        Anything in ConfAI today that nearly does this, and why it does not.
    validations:
      required: false
