version: 2

updates:
  # One pull request a week for Rust dependencies, not one per crate. Patch and
  # minor bumps ride together; a major bump gets its own pull request because it
  # is the one that needs reading.
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps)"
    labels:
      - dependencies
    groups:
      cargo-minor:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
      cargo-major:
        patterns:
          - "*"
        update-types:
          - major

  # Action bumps are almost always noise individually and worth doing in one go.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "ci(deps)"
    labels:
      - dependencies
      - github-actions
    groups:
      actions:
        patterns:
          - "*"
